<!doctype html>
<html lang="es">
  <head>

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Security Headers (meta-equivalent; full HTTP headers se aplican en el hosting) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />

    <!-- Primary Meta Tags -->
    <title>TORO IA | Automatización con IA y consultoría para pymes en Toledo y España</title>
    <meta name="description" content="Consultoría de IA y automatización con n8n para pymes y empresas de seguridad. Eliminamos horas de trabajo manual sin cambiar tus sistemas. Toledo y toda España." />
    <meta name="author" content="TORO IA" />
    <meta name="keywords" content="consultoría IA, automatización de procesos, digitalización pymes, automatización n8n, empresas de seguridad, IA Toledo, IA España" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TORO IA | Automatización con IA para pymes" />
    <meta property="og:description" content="Eliminamos el trabajo manual con IA y n8n. Sin cambiar tus sistemas. Resultados en 2 semanas. Toledo y toda España." />
    <meta property="og:url" content="https://toroia.vip/" />
    <meta property="og:site_name" content="TORO IA" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="TORO IA | Automatización con IA para pymes" />
    <meta name="twitter:description" content="Eliminamos el trabajo manual con IA y n8n. Sin cambiar tus sistemas. Resultados en 2 semanas." />

      {
        "@context": "https://schema.org",

        "name": "TORO IA",
        "url": "https://toroia.vip/",
        "logo": "https://toroia.vip/icon-192.png",
        "email": "info@toroia.vip",
        "telephone": "+34 663 68 33 53"
      }
    </script>

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "@id": "https://toroia.vip/#localbusiness",

        "image": "https://toroia.vip/icon-192.png",

        "telephone": "+34 663 68 33 53",
        "email": "info@toroia.vip",
        "priceRange": "€€€",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "C. Castillo de Almansa",
          "addressLocality": "Escalona",
          "postalCode": "45910",
          "addressRegion": "Toledo",
          "addressCountry": "ES"
        },
        "areaServed": [
          { "@type": "AdministrativeArea", "name": "Toledo" },
          { "@type": "Country", "name": "España" }
        ],
